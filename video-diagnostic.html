<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Video Diagnostic</title>
  <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu; padding:20px} pre{background:#f6f6f6;padding:12px;border-radius:8px}</style>
</head>
<body>
  <h1>Video Diagnostic</h1>
  <p>Testing: <strong>assets/videos/tuteka tara.mp4</strong></p>
  <video id="diagVideo" controls width="540" crossorigin="anonymous">
    <source src="assets/videos/tuteka tara.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div style="margin-top:12px">
    <button id="btnInspect" type="button">Inspect now</button>
    <button id="btnPlay" type="button">Play (unmute)</button>
    <button id="btnMeasure" type="button">Measure audio level (3s)</button>
  </div>
  <h3>Diagnostics</h3>
  <pre id="output">Press Inspect</pre>

  <script src="js/video-diagnostic.js"></script>
</body>
</html>
